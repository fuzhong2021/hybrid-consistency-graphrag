# GraphRAG Pipeline Configuration
#
# STATUS: Pipeline-Skizze, NICHT verbindlich für das Konsistenzmodul.
#
# - Diese Datei beschreibt die geplante GraphRAG-Pipeline (LLM-Provider,
#   Embedding, Chunking, Retrieval) und wurde für ein zukünftiges
#   End-to-End-System entworfen.
# - Das aktuell evaluierte Konsistenzmodul liest diese YAML NICHT.
# - Verbindliche Konfiguration: src/consistency/base.py::ConsistencyConfig
#   und die inline-Config in evaluation/multi_dataset_evaluation.py
#   (siehe README, Abschnitt "Konfiguration").
# - Die hier gelisteten Relationstypen (deutsch) sind eine reduzierte
#   Beispielmenge; in den Evaluationen wird ein erweiterter Satz aus
#   englischen Benchmark-Relationen + deutschen Standard-Relationen
#   verwendet.

llm:
  provider: "openai"  # oder "local" für Ollama
  model: "gpt-4-turbo-preview"
  temperature: 0.0
  max_tokens: 4096

embeddings:
  provider: "openai"
  model: "text-embedding-3-small"
  dimensions: 1536

chunking:
  method: "semantic"  # oder "fixed", "sentence"
  chunk_size: 512
  overlap: 50

graph:
  entity_types:
    - "Person"
    - "Organisation"
    - "Ort"
    - "Ereignis"
    - "Dokument"
    - "Konzept"
  
  relation_types:
    - "ARBEITET_BEI"
    - "BEFINDET_SICH_IN"
    - "BETEILIGT_AN"
    - "BEZIEHT_SICH_AUF"
    - "IST_TEIL_VON"

consistency:
  validation_rules:
    - "entity_type_check"
    - "relation_validity"
    - "temporal_consistency"
    - "semantic_similarity_threshold"
  
  conflict_resolution: "llm_arbitration"  # oder "majority_vote", "recency"
  similarity_threshold: 0.85

retrieval:
  strategy: "hybrid"  # graph + vector
  max_hops: 2
  top_k: 10
